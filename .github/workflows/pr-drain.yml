name: PR drain (close-stale + reconcile)

# CLOSE-STALE + DIRTY-CONFLICT + RECONCILE, via the shared reusable.
# Reusable: SuxOS/.github/.github/workflows/pr-drain.yml
# Org rulesets (SuxOS/.github#669) require only `security-review` fleet-wide — no
# per-repo CI job is a required status check anymore. Must stay in lock-step with
# automerge.yml's list.

on:
  schedule:
    - cron: "53 * * * *" # hourly, offset from sibling repos to spread shared-subscription load
  workflow_dispatch:

jobs:
  drain:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: SuxOS/.github/.github/workflows/pr-drain.yml@main
    with:
      required-gates: |
        security-review
    secrets: inherit
