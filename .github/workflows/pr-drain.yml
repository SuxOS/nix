name: PR drain (close-stale + reconcile)

# CLOSE-STALE + DIRTY-CONFLICT + RECONCILE, via the shared reusable.
# Reusable: SuxOS/.github/.github/workflows/pr-drain.yml
# required-gates lists only the org-wide ruleset gate (`security-review`). This repo's
# own required check (`flake-check`) is STILL independently enforced by a live per-repo
# ruleset, not by this assertion — #669 meant to retire that once a canonical CI gate
# joined the org ruleset, but that part never landed (tracked in #717). Must stay in
# lock-step with automerge.yml's list.

on:
  schedule:
    - cron: "53 * * * *" # hourly, offset from sibling repos to spread shared-subscription load
  workflow_dispatch:

jobs:
  drain:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: SuxOS/.github/.github/workflows/pr-drain.yml@main
    with:
      required-gates: |
        security-review
    secrets: inherit
