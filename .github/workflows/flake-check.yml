name: flake-check

# CI IS the verification loop for this repo — it was authored on a Mac without local nix,
# so `nix flake check` here is what actually proves the flake evaluates and the ucode-box
# overlay builds. Runs on x86_64-linux (GitHub-hosted), matching the "let CI do the nix"
# split: the Mac consumes devShells, CI + the binary cache do the building.

on:
  push:
    branches: [main]
    paths: ["flake.nix", "flake.lock", ".github/workflows/flake-check.yml"]
  # No paths filter on pull_request: flake-check is this repo's required merge gate
  # (automerge.yml/pr-drain.yml required-gates + the main-branch ruleset), and a
  # path-filtered REQUIRED check never reports on a non-matching PR — which wedges that
  # PR BLOCKED forever waiting on a status that will never arrive (the org's known
  # path-filtered-required-check jam). Nix copies the whole tree into the store anyway,
  # so any file can affect evaluation; push:main keeps its filter since nothing gates on it.
  pull_request:
  merge_group:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v14
      - uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8
      # Auto-generate flake.lock on the first run (no manually-computed hashes), then verify.
      - name: Lock inputs
        run: nix flake lock --accept-flake-config
      - name: nix flake check
        run: nix flake check --accept-flake-config --print-build-logs
      - name: Build the box-pinned ucode
        run: nix build .#ucode-box --accept-flake-config --print-build-logs
      # Surface the generated lockfile so a maintainer can commit it back to pin inputs.
      - name: Upload flake.lock
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flake.lock
          path: flake.lock
          if-no-files-found: ignore
